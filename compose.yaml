services:
  videowall:
    image: videowall
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videowall
    ports:
      - "${HOST_PORT:-80}:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-videowall-admin}
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - videowall_data:/app/data
    restart: unless-stopped

volumes:
  videowall_data:
    name: ${DATA_VOLUME_NAME:-videowall_data}
